<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#145f68">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="VOCA Loop">
  <title>VOCA Loop</title>
  <link rel="manifest" href="./manifest.webmanifest?v=1.1.3-rc.1">
  <link rel="icon" type="image/png" href="./icon-192.png?v=1.1.3-rc.1">
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon-v1.1.3.png">
  <link rel="apple-touch-icon-precomposed" sizes="180x180" href="./apple-touch-icon-v1.1.3.png">
  <style>
    :root{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;color:#172126;background:#f4f4f6}
    *{box-sizing:border-box}body{margin:0;min-height:100svh;display:grid;place-items:center;padding:24px;background:linear-gradient(180deg,#eef6f5,#f4f4f6 45%)}
    main{width:min(100%,430px);background:#fff;border:1px solid #dce5e4;border-radius:28px;padding:32px 26px;box-shadow:0 18px 50px rgba(28,58,60,.12)}
    .brand{display:flex;align-items:center;gap:13px;margin-bottom:34px}.mark{width:54px;height:54px;border-radius:16px;background:#145f68;color:#fff;display:grid;place-items:center;font-size:30px;font-weight:800}.name{font-size:21px;font-weight:800;letter-spacing:.04em}
    .eyebrow{font-size:12px;font-weight:800;color:#48777b;letter-spacing:.11em}h1{font-size:30px;line-height:1.24;margin:10px 0 14px}p{font-size:16px;line-height:1.65;color:#59686b;margin:0}
    .status{margin-top:28px;padding:16px;border-radius:17px;background:#edf7f6;color:#145f68;font-weight:750;display:flex;align-items:center;gap:10px}.dot{width:9px;height:9px;border-radius:50%;background:#1c8d81;box-shadow:0 0 0 5px rgba(28,141,129,.12)}
    ol{margin:25px 0 0;padding-left:22px;color:#344447;line-height:1.8}small{display:block;margin-top:24px;color:#7a8789;line-height:1.5}
  </style>
</head>
<body>
  <main>
    <div class="brand"><div class="mark">V</div><div class="name">VOCA LOOP</div></div>
    <div class="eyebrow">v1.1.3-rc.1 · PWA ICON CHECK</div>
    <h1>홈 화면 아이콘<br>실기기 확인 준비 완료</h1>
    <p>이 페이지는 승인된 VOCA Loop 아이콘을 iPhone 홈 화면에서 확인하기 위한 배포 체크포인트입니다.</p>
    <div class="status"><span class="dot"></span>HTTPS 배포 및 Apple 아이콘 연결됨</div>
    <ol><li>Safari 공유 버튼을 누릅니다.</li><li>‘홈 화면에 추가’를 선택합니다.</li><li>VOCA Loop 아이콘이 표시되는지 확인합니다.</li></ol>
    <small>기존 아이콘이 남으면 홈 화면의 기존 항목을 먼저 삭제한 뒤 다시 추가하세요.</small>
  </main>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js',{scope:'./'}).catch(()=>{});
  </script>
</body>
</html>
