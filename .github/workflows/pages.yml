name: Deploy VOCA Loop to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - DEPLOYED.txt
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Record deployment URL
        run: |
          printf '%s\n' '${{ steps.deployment.outputs.page_url }}' > DEPLOYED.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add DEPLOYED.txt
          git diff --cached --quiet || git commit -m 'Record GitHub Pages deployment URL'
          git push
